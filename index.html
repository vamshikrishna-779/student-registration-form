<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>student registration form</title>
</head>
<body>
    <header>
        <img src="https://thumbs.dreamstime.com/b/registration-online-membership-network-internet-business-technology-concept-104512007.jpg" height="240" width="650">
    </br>
    <h1><b><pre>           <u>STUDENT REGISTRATION FORM</u> </pre></b></h1>
       

    </header>
    <main>
<form>
<ul><pre>
<li>Student  name: <input type ="text" placeholder="enter name"></li></pre>
<pre>
<li>Roll no      : <input type="text" placeholder="Ex:1602-25-737-001"></li></pre>
<pre>
<li>Fathers name : <input type="text" placeholder="enter name"></li></pre>
<pre><li>Date of birth: <input type="text" placeholder="DD-MM-YYYY" >
</li></pre>
<pre><li>Mobile number: <input type="number" placeholder="enter phone number">
</li></pre>
<pre><li>Email id     : <input type="text" placeholder="example@gmail.com"></li></pre>
<pre><li>Password     : <input type="password" placeholder="minimum 8 characters"></li></pre>
<pre><li>Gender       :<label><input type="radio" value="Male" name="gender">Male <input type="radio" value="Female" name="gender">Female</label></li></pre>
<pre><li>Department   : <label><input type="radio" value="cse" name="branch">CSE</label><label> <input type="radio" value="it" name="branch">IT</label><label> <input type="radio" value="ece" name="branch">ECE</label><label> <input type="radio" value="eee" name="branch">EEE</label><label> <input type="radio" value="mech" name="branch">MECH</label><label> <input type="radio" value="civil" name="branch">CIVIL</label></li></pre>
<pre><li>City         : <select> <option value="Hyderabad">Hyderabad</option><option value="secundrabad">Secundrabad</option><option value="medchal">medchal</option></select></li></pre>
<pre><li>Address      :</li></pre>
<pre>               <textarea name="address" id="101" placeholder="Enter your address here" ></textarea></pre>
<footer>
    <pre>                      <input type="submit" value="submit"></pre>
</footer>

</ul></form>








    </main>
</body>
</html>
